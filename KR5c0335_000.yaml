front:
  text: 丹論訣旨心鑑松二
  hash: sha256:aadce9e2afd64bd6cccd0a3b1076ba8193e06e565c57bc1e6aae71dfe370589d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0335_HFL_000-001a, image: hfl/0598/0598-026.png}
body:
  text: 張元德撰序訣章第一參同契云諸術甚衆多千條有萬餘即知大丹之妙唯鉛汞二物為至藥也非用四黃八石若大丹有石藥之氣入二物中即有大毒凡言死水銀固生人即須隂陽之氣水火結成為大丹服之長生若用礬石硫黃𥐻砂等燠伏為藥服之有大毒久久損人乃有食銅壞鐡之功豈堪服食礬石有殺虎之能此可為深戒大凡學得傳受一小法即言世人少雙將丹與人服之倏有夭橫之斃深可哀之自後見者生嫌皆云丹石發於瘡癤癰腫蓋此謬惑之徒毀謗金丹之功不可服餌凡石乳之輩能不食為妙不可以徇情色強而服之致枉夭者百有百矣冝審省解之藥須宣瀉喫防已葵萊甘草湯漸出之可服大藥也且大丹是天地玄元正真之氣太皇衆仙之食包四象以成形依乾坤而自化結成紅紫色變為丹名曰正陽專陽元陽一還丹也豈可容易而會奉道君子審而保之傳付得人道不廢矣天生造化用合三才依易象布卦節順隂陽之氣候一年之大終日月之度數而成丹也固可得之古仙皆因此而成仙也長生久視凡者聞之撫掌大笑智者一聞悟解大契真元余恐不才故引三聖真人歌證之金丹論明之更不煩重他説夫還丹者被日月運成還其本元𨚫歸本丹砂之色名曰還丹丹有三等一名正陽丹上元也二名專陽丹中還也次名元陽丹本一體而三品並大還之宗也不知此妙不可言其修丹之術事也又單以鹵水煮伏丹砂獨伏水銀並不可何也孤隂無陽也久久損人不是正陽之位又有用曾雌殺水銀雄雌成之亦不堪服食此互相傳受非真聖之良藥者何也八石俱有毒也金碧經云損去五礬不用八石訣云不用藥用五行此為理之至要者矣明辨章第二夫硫黃三兩能制水銀一斤故知汞力不如硫黃汞一兩之力如牛一頭即知硫黃一兩制水銀五兩水銀力不如硫黃也如此説功力大丹不用硫黃用真鉛也真鉛五兩能制水銀二斤水銀力不如真鉛也故隂伏陽非陽能伏隂此之為反也夫至道求長生養志修真不得大丹終無得理忽遇此訣皆多積福方得知此祕文若傳非人皆七祖受殃及損子孫凡修大丹不在藥味事在五行精究易象分明辨節序之運移知日月度數隂陽相使神仙之要合道之宗輒不可信八石四黃非長生之妙藥夫鉛汞大丹之根五行之本八石之主金性冷居其陽坎中一陽也汞即生於朱中是也石性熱居其隂離中二隂也鉛中金真鉛也故曰隂陽相合所以陽即是君隂即是臣石浮金沉之義明矣君臣相得浮沉得度藥物和合即神仙之妙要也若不知君臣不辨明本類徒費千金終無得理必知君臣合君臣乾坤之要大丹之術自明矣且以鉛為君能引五藏以汞為臣龍殺三賊通於神明光于四海故玄人訣云用鉛不用鉛五金生於鉛中用鉛不用鉛五金自出鉛中此至玄之言也賢者審而知之方知道可成也用鉛不用鉛鉛者五金之精髓七寶之良媒夫大丹乃與天地而齊畢五金切忌於鉛將何物而制之五金歌曰以黃芽為根黃芽是何物又欲用何鼎器黃芽不是鉛不離鉛中作胡剛子問曰用何物作又云不用五金八石用何物而生魏生答曰種禾當用粟非類不可成也若以五金八石為之即狐兔不乳馬燕雀不生鳯何異將膠補釜醫病用野葛乎異類不同種安能合體居點金須用金花銀須用銀黃芽鉛裏得方知此道親鉛若是真不失家臣鉛若不真其汞不親白虎作腦黃芽為根青腰使者赤血將軍此青汞中有丹砂也非用曽青也若人得此術可保重之若泄之當減夀殃子孫隂符云師者言不同道者祕之恐招殃咎也夫慕道之人至誠感神曉會其義方知大道難求世人罕會世人愚迷不見其義雖精覽方書一無成者何也一且不遇至人明師二乃措意罔象自為多有此輩余曽嵩山見司馬希夷修大丹喜乃問訪之火已五月余問之伊又祕奈何欲明此道恐此子虛為纍日久見之不成也他又云大道有三般二內一人看遂於鉛汞中用雄黃也果非大桑之妙只是罔象尋文自為又見李尊師子虛於二味中入硫黃亦言內用一人看此二子並非正解傳處誤也余愍而哀之二子根性不純熟迹不反徒自孤我終無得年且內一人看即戊已之鼎此子不了虛而為之徒經皓首果不遇余非余之過皆道不合人五金歌曰不是藥不聖恐藥而不正不怕藥不神恐藥而不真若智者曉會此義是正真通靈真人也何愁龍虎大丹不成可謂日月在手造化由心真實不虛之説耳丹者龍虎真文云虎者真鉛也龍者真汞也反鉛為黃芽反水銀為真汞真鉛不枯真汞不飛即此非世間水銀也已出一切塵俗耳馬自然歌訣云汞生水銀死鉛因靈芽是出世為還丹迷人不能委汞與水銀別迷人用之拙若了此真源可以凡俗隔後之學者固不遇真師傳矣訣曰用鉛八兩為陽為乾為虎又水銀八兩為隂為坤為青龍此二物能變化為鉛亦隂也本黑水一隂也又一爻陽也水銀木也三也為朱砂火也火數二火中陰也故藥自有隂陽遞相制伏為於至藥此二靈物是天地隂陽之正象豈凡八石四黃為丹乎智者詳之此太古一切真人仙人真境真母也故言乾坤剛柔配合龍虎八兩屬乾八兩屬坤一兩有四分分有六銖一分應一卦一兩應四卦八兩有三十二卦乾八以應三十二卦坤八亦應三十二卦合六十四卦道之本也二八共一斤以應六十四卦銖有三百八十四象一年三百六十日古仙觀易象合乾坤應為於節候一年大畢合周天數豈更有四黃八石何以合之乾象乎口訣云黃芽一水銀二木三人二水一金四土五法天象地此中矣孤隂亦不可孤陽亦不可又訣云白金為君本黑金精也西方之位太陽之精金碧經云鍊銀於鉛神物自生灰池炎鑠鉛沈銀浮潔白見寶可造黃金芽又隱言名黃輕又曰黃芽又名秋石秋是西方之位石是兊長之名其性隂隂中陽也是長生之至藥芽是萬物之初也故號芽緣因白被火變色黃故名黃芽淮南王號秋石王陽得之名黃芽大古真人名還丹至訣言二物何靈而堪為大丹真人曰金於鉛中九鍊受其水火氣足水銀於太陽中受氣足此二物各於隂陽中受氣畢故聖人採之為大藥相和入土器中上下水火升降功畢千變萬化勿遇相類相從龍吟雲起虎嘯風生道之交感非類不可若以雜石藥參雜意希化寶舉浩劫而不成此二物太古真人之法千金不可傳也故金丹證之矣金丹論章第三夫丹砂太陽之精本受太陽之正氣因大變白居青帝之首為汞之名是木生于火自含德而至靈鉛本黑精化為西方庚辛正位是以金生水水生于木二物自相匹敵若非至靈至聖何以成丹乎大凡愚人或言豈有餌金丹而長生久視余嘗愍而傷之自古真人聖者皆修鍊藥長生雖百千萬人皆知之豈有不信乎皆指秦皇漢武然大丹之靈不救自刑之禍昔劉玄穆事魏先生看火一年妄情有疑遂不遇而早夭徐景休勤心積德不怠昏旭師受以藥長生于仙在太白山亦一千餘歲此二子疑以不疑咫尺萬里得與不得雲泥有殊今喻而言之足可信矣且陽春既發令節巳行萬物承春之氣花落子孕感氣而實堪人食之此氣非目擊自然乎且五榖而可濟人之命然目擊而不見乎況至藥靈丹服之而可變骨為真人矣自是世人迷忘所計不信不修不遇不為巳虛度百生沈纍多劫是足傷乎貪榮顯求色欲以名利所係形枯質朽三官奪命被隂司誅罰又何以得長生乎又狡計多非損巳敗正奪人功而成自家業又何遇至人傳受乎修心靜念攝情歸道則可遇矣箬謗毀先德侵擾無辜又何而聞之夫五穀尚能滋神氣養命是敗腐之物猶延人益生豈況神丹而無玄德之功換凡肌脫病質駐顔益命乎與子論之目擊可知耳不欲廣陳委細事涉繁詞其餘妙旨清虛盡著金簡徐君魏先生淳干公此三人各通至術並神仙之徒謝玄沖蘇耽二子亦羽化金丹之客人皆知之何言及矣沉名山鄽市往往有物外之流混俗世間自韜姓字非其道同如何得知之請審非言勿輕泄侮令子得罪將謗金丹與聖人令子沈千劫之囚矣子不聞參同契云金與砂為主稟和於水銀即二物自靈矣又聞不用藥用五行即具金木水火土也又不聞白馬牙好丹砂卯酉二八和兩家又淮南鍊秋石黃帝美金華又鉛不是芽芽不是鉛真鉛真丹砂伏錬成一家巡火近九轉自然成黃芽又火花白藥花紅流汞秋石自相同流珠入體虎吞食不知何處認金公又自古燒丹者難窮鉛汞情若人知此理修制自通靈又孤陽不獨化孤隂不獨成本來同二物自有變身明又龍虎相逢遇何時不自顧白液共相吞相吞作夫婦隨化成黃芽遂時依后土若得紫河車便是神仙侣又神丹修得訣神用便由人生殺在我手參詳定為真修丹不得術終歲損心神莫鍊枯鉛汞拋功與土塵又天地日月中神藥號金公金公爾是鉛本向鉛裏蒙分明向君説迷者又忽匆點求安鉛裹金花約略同此花不是藥徒自枉拋功此者神仙術何曽不大通熟念參同契仍依古類融但得真鉛理修持必見終又鉛汞合天地修作大還丹丹成芽自見非此實為難太古真人説如今得見歡方知神不誑須信道將安中有五彩靈變化伏其般十月脫胎出令人見可觀為報榮華子百年凋與殘如何空棄世兀兀道將闌孰説君猶謗詞虛理更漫𠺜見南山塵積年為丘山茫茫苦海中生死成波瀾自古帝王居至今何足看又白液爐中化黃芽變漸成憶初相見日難看水銀形陽極生隂火火衰陽氣併自變紫河車服食堪長生又一箇月白液初凝恰如雪兩箇月似乳為酥漸漸結三箇月半含蘂綻垂珠劣四箇月二物抱持如點血五箇月飛騰戀母聲嗚咽六箇月行到子宫隂氣絶色似鵝兒分明別七箇月垂隂受氣乎足厥八箇月欲成藏府金凝血九箇月點點殘珠長毛髮十箇月母子分明欲相別此時母困子體全似見顔容尚如雪鉛脫胞後鉛面肉白如雪更向爐中溫養之名為食乳肌膚恱出兒毒氣當依訣藥已成入赤色六十日出毒服食此藥如兒在母胎精神爽朗分肌骨勸君學者須精微莫枉悠悠拋日月此中妙不能説有次第莫虧越但能修得黃芽成變轉之功不休歇食長生換白髮有白銀救孤拙仁者得之修不闕與道契宿緣深傳之得人正在心非道者罪將沈得亦為災禍害侵關造化不容易取次不得輕傳付君不聞古人語妄有傳之殃七祖君須信不在疑賢者通明必得之今日囑君千萬意歷歷結盟當記之陽初復十一月用下火也隂起姤十一月至四月陽極至五月一陰生轉大也爐寄中央戊已土鼎中上下互相湊謹守固之勿令走消息不失看節候有龍有虎相奔驟嬰兒寂寂顔初幼由母養之母肥瘦子成因母長相救陽極乾隂極坤乾四象易之門六十四卦修中尊龍虎相嚙自相吞立生定位此中存水火為媒掬我魂隂陽養我明晨昏八節運移寒與溫看看漸交黃芽根日日相催母感恩因之結實立真門千秋萬歲生子孫審藏祕愼勿須論此道玄微未可言時人笑道濁昏渾寧可深居市與村莫將妙藥示凡者見之謗之言語喧君切記祕而藏之可金匱長生之術傳道人自有天官録名字大還丹宗旨章第四夫言還丹者即可服食而仙也自古之天人留此術降下人間傳付黃帝黃帝得之白日鼎湖升仙若古往神仙不一一具言也夫論還丹皆至藥而為之即丹砂之玄珠金鉛汞虎之靈異有上仙自然之還丹生太陽背隂向陽之山丹砂皆生南方不生北方之地自然還丹是流汞抱金公而孕也有丹砂處皆有鉛及銀四千三百二十年丹成左雄右雌上有丹砂下有曽青抱持日月隂陽氣四千三百二十年故乃氣足而成上仙天人還丹下界神仙修錬鉛汞一年成取十一月一陽生而下火至來年十一月成丹象上界仙人天人聖人取食者還丹故為自然還丹是仙人天人聖人取食之今修者象而成之大千之數服之亦長生羽化與天同功問曰何以一年象之天生還丹之數答曰上界一日一夜為人問五年且人間一年十二月三百六十日一月三十日又一日十二時一月三百六十時合一年四千三百二十時象天生自然還丹此亦上界真仙流傳人間有依法度日月精氣四時運移得成服之皆延年上升上士修真契理羽化上升中士服之地仙下士延年長生不死服食之門别有法矣玄記章第五赤松子曰丹砂之精有白有朱含火得白是虎號朱是火丹丹中生汞三者同一體也白虎金象西方之艮含五彩之瑞包八石之異鉛是白虎與汞為匹敵也二物為之君臣天地為夫妻為子母神而妙之不與三黃同不與八石類逈然造化而修制之為還丹也余昔遇道人傳授修之合符已至羽化敢歌訣之歌曰神術妙難測鉛汞人不識鉛汞天地精隂陽天地力功歸於戊已能生一切食萬物用土功土是母之極母養一切子子亦因母植三物自通靈二氣玄元直功在城坦固務在堅柔識必在於人成由人所心憶心靈藥自靈心迷藥難測至道至心虛玄中妙難息智了得宗源他年致雲翼梁朝四公子訣有歌曰鉛汞合神功交歸太玄旨全在五行中盡入三才智神仙留至門服食令人異若得真鉛門神仙自然矣丹論訣旨心鑑
